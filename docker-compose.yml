services:

  backend:
    build: ./backend
    container_name: ghumgham-backend

    ports:
      - "5000:5000"

    volumes:
      - ./backend:/app
      - /app/node_modules

    env_file:
      - ./backend/.env

  frontend:
    build: ./frontend
    container_name: ghumgham-frontend

    ports:
      - "5173:5173"

    volumes:
      - ./frontend:/app
      - /app/node_modules

    depends_on:
      - backend